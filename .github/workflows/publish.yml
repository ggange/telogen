name: Publish

on:
  push:
    tags:
      - 'v*'        # telogen (root package)
      - 'react-v*'  # telogen-react (packages/react)

jobs:
  publish:
    if: ${{ !startsWith(github.ref_name, 'react-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        # Prerelease versions (0.1.5-rc.1) go to the rc dist-tag so an rc
        # publish can never move `latest`.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          case "$PKG_VERSION" in *-*) TAG=rc;; *) TAG=latest;; esac
          npm publish --provenance --access public --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test (bin via symlink)
        run: |
          mkdir -p /tmp/smoke/app
          echo 'export const metadata = { title: "Smoke", description: "ok" }; export default function P() { return <main><h1>Smoke</h1></main>; }' \
            > /tmp/smoke/app/page.tsx
          cd /tmp/smoke && node $GITHUB_WORKSPACE/dist/cli.js --out out | tee /tmp/smoke/stdout.log
          grep -q '\[Smoke\]' /tmp/smoke/out/llms.txt
          # version must be baked in at build time — 0.0.0-dev means define failed
          PKG_VERSION=$(node -p "require('$GITHUB_WORKSPACE/package.json').version")
          grep -q "^telogen v$PKG_VERSION$" /tmp/smoke/stdout.log
          grep -q "generated by telogen v$PKG_VERSION" /tmp/smoke/out/llms.txt
          echo "smoke: OK"

  publish-react:
    if: ${{ startsWith(github.ref_name, 'react-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/react/package.json').version")
          [ "react-v$PKG_VERSION" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package $PKG_VERSION"; exit 1; }

      - name: Publish telogen-react to npm
        working-directory: packages/react
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test (registry fetch)
        run: |
          sleep 15
          npm view telogen-react version
