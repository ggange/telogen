name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test (bin via symlink)
        run: |
          mkdir -p /tmp/smoke/app
          echo 'export const metadata = { title: "Smoke", description: "ok" }; export default function P() { return <main><h1>Smoke</h1></main>; }' \
            > /tmp/smoke/app/page.tsx
          node dist/cli.js --out /tmp/smoke/out
          grep -q '\[Smoke\]' /tmp/smoke/out/llms.txt
          echo "smoke: OK"
